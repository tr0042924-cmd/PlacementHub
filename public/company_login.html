<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Login - PlacementHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #f97316, #ea580c);
            padding: 50px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.3; }
        }

        .header-content {
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        .form-section {
            padding: 50px 30px;
        }

        .form-group {
            margin-bottom: 30px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #374151;
            margin-bottom: 10px;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-control:focus {
            outline: none;
            border-color: #f97316;
            background: white;
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1);
            transform: translateY(-2px);
        }

        .form-control:hover {
            border-color: #d1d5db;
            background: white;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.3);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(249, 115, 22, 0.4);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .links {
            text-align: center;
            padding-top: 25px;
            border-top: 1px solid #e5e7eb;
        }

        .links a {
            color: #f97316;
            text-decoration: none;
            font-weight: 500;
            margin: 0 5px;
            transition: all 0.3s ease;
            padding: 5px 10px;
            border-radius: 8px;
        }

        .links a:hover {
            color: #ea580c;
            background: rgba(249, 115, 22, 0.1);
        }

        .required {
            color: #ef4444;
        }

        .business-features {
            background: linear-gradient(135deg, #fff7ed, #fed7aa);
            border-left: 4px solid #f97316;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
        }

        .business-features h3 {
            color: #c2410c;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .business-features ul {
            list-style: none;
            color: #c2410c;
        }

        .business-features li {
            margin-bottom: 8px;
            position: relative;
            padding-left: 20px;
        }

        .business-features li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: #f97316;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                border-radius: 16px;
            }

            .header {
                padding: 40px 20px;
            }

            .header h1 {
                font-size: 2.2rem;
            }

            .form-section {
                padding: 40px 20px;
            }

            .form-control {
                padding: 16px 18px;
                font-size: 1rem;
            }

            .btn {
                padding: 16px;
                font-size: 1rem;
            }
        }

        .form-animation {
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>
    <div class="container form-animation">
        <div class="header">
            <div class="header-content">
                <span class="icon">🚀</span>
                <h1>Company Portal</h1>
                <p>Access your recruitment dashboard</p>
            </div>
        </div>

        <div class="form-section">
            <div class="business-features">
                <h3>Your Business Portal</h3>
                <ul>
                    <li>Access qualified candidates</li>
                    <li>Manage job postings</li>
                    <li>Track applications</li>
                    <li>Schedule interviews</li>
                </ul>
            </div>

            <form action="/company_login" method="POST">
                <div class="form-group">
                    <label for="name">Company Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="Enter your company name">
                </div>

                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
                </div>

                <button type="submit" class="btn">Access Dashboard</button>
            </form>

            <div class="links">
                <a href="company_register.html">New Company? Register Here</a>
                <br><br>
                <a href="index.html">← Back to Main Page</a>
            </div>
        </div>
    </div>

    <script>
        // Add interactive feedback
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('label').style.color = '#f97316';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('label').style.color = '#374151';
            });
        });

        // Form submission feedback
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = document.querySelector('.btn');
            btn.innerHTML = 'Accessing Dashboard...';
            btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
            
            setTimeout(() => {
                btn.innerHTML = 'Access Dashboard';
                btn.style.background = 'linear-gradient(135deg, #f97316, #ea580c)';
            }, 2000);
        });

        // Add some visual feedback for business features
        document.querySelectorAll('.business-features li').forEach(item => {
            item.addEventListener('mouseenter', function() {
                this.style.transform = 'translateX(10px)';
                this.style.color = '#f97316';
            });
            
            item.addEventListener('mouseleave', function() {
                this.style.transform = 'translateX(0)';
                this.style.color = '#c2410c';
            });
        });
    </script>
</body>
</html>
